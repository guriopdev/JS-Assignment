<body>
<script>
function user_input_q4() {
    let base = parseInt(prompt("Enter base:"));
    let distance = parseInt(prompt("Enter distance:"));
    let minutesLate = parseInt(prompt("Enter minutesLate:"));
    let seed = parseInt(prompt("Enter seed:"));
    if (1 <= base && base <= 1000 &&
        0 <= distance && distance <= 100 &&
        0 <= minutesLate && minutesLate <= 120 &&
        0 <= seed && seed <= 9) {
        let fare = base + 7 * distance;
        if (minutesLate > 15) {
            fare = fare + 20;
        }
        if (distance > 10) {
            fare = fare + Math.floor(fare * 0.10);
        }
        if (seed % 2 !== 0) {
            fare =fare - seed;
        } else {
            fare = fare + seed;
        }
        fare = Math.ceil(fare / 5) * 5;
        alert(fare);
    }
}
</script>
<button onclick="user_input_q4()">q4 enter base , distance, minutesLate and seed</button>
</body>
